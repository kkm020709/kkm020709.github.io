backend:
  name: git-gateway
  branch: main

site_url: https://kangxia.top
display_url: https://kangxia.top
logo_url: /assets/images/favicon.ico

media_folder: "public/uploads"
public_folder: "/uploads"

publish_mode: editorial_workflow

collections:
  - name: "posts"
    label: "Blog Posts"
    folder: "src/content/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Publish Date", name: "published", widget: "datetime" }
      - { label: "Update Date", name: "updated", widget: "datetime", required: false }
      - { label: "Cover Image", name: "image", widget: "image", required: false }
      - { label: "Category", name: "category", widget: "string", required: false }
      - { label: "Tags", name: "tags", widget: "list", default: [] }
      - { label: "Language", name: "lang", widget: "string", required: false, hint: "例如 zh_CN / en" }
      - { label: "Pinned", name: "pinned", widget: "boolean", required: false, default: false }
      - { label: "Author", name: "author", widget: "string", required: false }
      - { label: "Source Link", name: "sourceLink", widget: "string", required: false }
      - { label: "License Name", name: "licenseName", widget: "string", required: false }
      - { label: "License URL", name: "licenseUrl", widget: "string", required: false }
      - { label: "Enable Comment", name: "comment", widget: "boolean", required: false, default: true }
      - { label: "Draft", name: "draft", widget: "boolean", required: false, default: false }
      - { label: "Body", name: "body", widget: "markdown" }
